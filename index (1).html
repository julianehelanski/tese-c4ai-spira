const C={chapter:"#3a8fa8",person:"#a06832",institution:"#6b5aaa",nonhuman:"#3a8a60",concept:"#8a8a30",media:"#a03868",historical:"#806040",core:"#1a1a18"};
const nodes=[
{id:"tese",label:"Tese",type:"core",size:22,title:"Como seguir cientistas e engenheiros universidade afora",badge:"Tese de doutorado · USP 2025",content:`<p>Entre 2022 e 2025, acompanhei a construção de inteligência artificial no Centro de Inteligência Artificial da Universidade de São Paulo (C4AI), estabelecido em 2020 mediante parceria de co-financiamento entre a USP, a FAPESP e a IBM.</p><p>O que começou como pergunta simples — <em>onde está o laboratório de IA?</em> — transformou-se em documentação do ciclo completo de uma parceria público-privada: da fundação (2020) à dissolução (2025).</p><p>A tese mobiliza a Teoria Ator-Rede de Bruno Latour como orientação teórico-metodológica, articulada com contribuições de John Law, Marilyn Strathern, Annemarie Mol e Isabelle Stengers.</p><div class="tags"><span class="tag">C4AI</span><span class="tag">IBM</span><span class="tag">USP</span><span class="tag">TAR</span><span class="tag">STS</span><span class="tag">etnografia</span></div>`},
{id:"cap1",label:"Apresentação",type:"chapter",size:13,title:"Apresentação",badge:"Capítulo 1",content:`<p>Março de 2022. Estou no InovaUSP, em São Paulo, para minha primeira visita ao C4AI. A inteligência artificial não fazia parte de meu projeto inicial de pesquisa.</p><p>Ao me aproximar da sala dos pesquisadores, notei sua configuração peculiar: a porta estava fechada, mas uma parede inteira de vidro expunha todo o interior. Fileiras de computadores, ninguém presente.</p><p>Perguntei se uma sala com GPUs era o laboratório do Centro. João disse que não — era como se fosse a área de TI. A situação transformou-se em problema de pesquisa: <em>onde está o laboratório de IA e onde estão os seus cientistas?</em></p><div class="tags"><span class="tag">InovaUSP</span><span class="tag">laboratório distribuído</span><span class="tag">origem etnográfica</span></div>`},
{id:"cap2",label:"Enquadramento\nteórico",type:"chapter",size:13,title:"Enquadramento teórico",badge:"Capítulo 2",content:`<p>O capítulo desenvolve o quadro teórico-metodológico mobilizado na tese: a Teoria Ator-Rede como orientação principal, articulada com contribuições sobre mediação técnica, agência distribuída e multiplicidade ontológica.</p><p>Discute a colaboração com IA generativa (Claude) na escrita da tese como experimentação metodológica deliberada — <em>fazer parentesco com um parente estranho</em> — seguindo a proposta de Haraway de ficar com o problema.</p><div class="tags"><span class="tag">TAR</span><span class="tag">Latour</span><span class="tag">Mol</span><span class="tag">IA generativa</span><span class="tag">método</span></div>`},
{id:"cap3",label:"A rede que\nFábio e Cláudio\nconstruíram",type:"chapter",size:17,title:"A rede que Fábio e Cláudio construíram",badge:"Capítulo 3",content:`<p>Fevereiro de 2023. Na Bluetalks no Inovabra Habitat, assisti a uma troca reveladora entre a audiência e Cláudio sobre os ganhos da IBM com a parceria.</p><blockquote>A IBM se beneficia ao incentivar um ecossistema de inovação em IA [...] para que as pesquisas atendam às necessidades do setor; assim, surgiria uma demanda por serviços que a IBM poderia fornecer. — Cláudio Pinhanez</blockquote><p>Esse deslocamento metodológico me levou da etnografia do presente a uma investigação histórica que conecta o C4AI a práticas tecnocientíficas da IBM ao longo de mais de um século — até o sistema de tabulação de Herman Hollerith em 1890.</p><p>Esta pesquisa documentou quase acidentalmente o ciclo institucional completo: nascimento (2020), consolidação (2021–2022), multiplicação institucional (incubação de 8 centros, 2022–2024) e dissolução (2025).</p><div class="tags"><span class="tag">Bluetalks</span><span class="tag">IBM</span><span class="tag">tecnopoder</span><span class="tag">translação</span><span class="tag">genealogia</span></div>`},
{id:"cap4",label:"A rede que\nMarcelo\nconstruiu",type:"chapter",size:17,title:"A rede que Marcelo construiu",badge:"Capítulo 4",content:`<p>O capítulo acompanha o desenvolvimento do SPIRA durante a pandemia de COVID-19. Sigo Marcelo Finger e os actantes mobilizados: pacientes hospitalizados, médicos, fonoaudiólogos, linguistas, smartphones, algoritmos, bases de dados de áudio, EPIs e o vírus SARS-CoV-2.</p><p>Introduzo o conceito de <em>covideiro</em>, neologismo cunhado por Marcelo, designando tanto os espaços de gravação quanto as práticas que transformaram pausas na fala em biomarcadores computacionais.</p><div class="fig-grid single"><div><div class="fig-label">rede sociotécnica do SPIRA</div><img class="fig-thumb" src="figuras/rede-sociotecnica-spira-2026-03-11-125858.png" data-caption="Rede sociotécnica do SPIRA" alt="rede sociotécnica"></div></div><div class="fig-grid"><div><div class="fig-label">cronologia 2020–2026</div><img class="fig-thumb" src="figuras/cronologia-spira-2026-03-11-130835.png" data-caption="Cronologia do SPIRA, 2020–2026" alt="cronologia"></div><div><div class="fig-label">translação antes/depois</div><img class="fig-thumb" src="figuras/translacao-spira-antes-depois-2026-03-11-233343.png" data-caption="Translação: antes e depois" alt="translação"></div></div><p style="font-size:.6rem;color:#aaa;margin-top:.5rem">diagramas completos:</p><a class="ext-link" href="figuras/cadeia-translacao-spira-2026-03-11-130346.png" target="_blank">↗ cadeia de translação (diagrama completo)</a><div class="tags"><span class="tag">SPIRA</span><span class="tag">covideiro</span><span class="tag">Marcelo Finger</span><span class="tag">Mol</span><span class="tag">translação inter-topológica</span></div>`},
{id:"marcelo",label:"Marcelo Finger",type:"person",size:12,title:"Marcelo Finger",badge:"Actante — pessoa",content:`<p>Professor do IME-USP, coordenador do grupo NLP2 no C4AI e criador do projeto SPIRA. Entrevistado em 6 de junho de 2023.</p><p>Sua narrativa retrospectiva sobre o desenvolvimento do SPIRA — com contingências, improvisações, fracassos e sucessos — revela camadas do processo de pesquisa que a inscrição científica final apaga.</p><p>Cunhou o neologismo <em>covideiro</em> para descrever os espaços hospitalares de coleta de áudio durante a pandemia.</p><div class="tags"><span class="tag">IME-USP</span><span class="tag">NLP2</span><span class="tag">SPIRA</span><span class="tag">covideiro</span></div>`},
{id:"fabio",label:"Fábio Cozman",type:"person",size:12,title:"Fábio Cozman",badge:"Actante — pessoa",content:`<p>Diretor do C4AI e porta-voz público do Centro em eventos como as Bluetalks. Percorre espaços externos ao laboratório realizando o trabalho de articulação política sem o qual o trabalho interno não existiria.</p><p>Revelou que projetos em saúde e agronegócio perderam financiamento quando a IBM vendeu essas divisões — evidenciando que a agenda de pesquisa estava estruturalmente acoplada a ciclos de negócio corporativos decididos em sedes americanas.</p><div class="tags"><span class="tag">C4AI</span><span class="tag">Bluetalks</span><span class="tag">porta-voz</span></div>`},
{id:"claudio",label:"Cláudio Pinhanez",type:"person",size:12,title:"Cláudio Pinhanez",badge:"Actante — pessoa",content:`<p>Vice-diretor do C4AI e representante da IBM na parceria. Entrevistado em 2 de outubro de 2025 — semanas antes de sua demissão, quando o IBM Research Brasil foi encerrado.</p><p>Em dezembro de 2025, anunciou via LinkedIn o fechamento definitivo do laboratório IBM Research Brasil:</p><blockquote>"Today I am just sad, sad, sad." O laboratório que operou por mais de 15 anos com mais de 100 pesquisadores havia sido encerrado completamente.</blockquote><div class="tags"><span class="tag">IBM</span><span class="tag">encerramento 2025</span><span class="tag">IBM Research Brasil</span></div>`},
{id:"c4ai",label:"C4AI",type:"institution",size:14,title:"Centro de Inteligência Artificial (C4AI)",badge:"Actante — instituição",content:`<p>Estabelecido em outubro de 2020 mediante parceria USP-FAPESP-IBM. Reuniu, entre 2021 e 2024, aproximadamente 250 pesquisadores em IA. Opera geograficamente distribuído — sem espaço físico único.</p><p>Ao longo de cinco anos, incubou oito centros de pesquisa e formou dezenas de pesquisadores. A parceria foi encerrada em dezembro de 2025 com a não-renovação do convênio FAPESP-IBM, documentando a vulnerabilidade estrutural de modelos baseados em dependência de financiamento corporativo único.</p><div class="tags"><span class="tag">USP</span><span class="tag">IBM</span><span class="tag">FAPESP</span><span class="tag">laboratório distribuído</span><span class="tag">dissolução 2025</span></div>`},
{id:"ibm",label:"IBM",type:"institution",size:14,title:"International Business Machines Corporation",badge:"Actante — instituição",content:`<p>Fundada em 1911 a partir da Tabulating Machine Company de Herman Hollerith (1896). A genealogia de 135 anos — dos cartões perfurados às plataformas de IA — é rastreada para compreender as práticas que estruturam a parceria com o C4AI.</p><p>Em 2025, ao encerrar o laboratório brasileiro e a parceria C4AI enquanto inaugurava novo centro na Índia, evidenciou que decisões sobre P&D seguem critérios corporativos que podem não coincidir com interesses de desenvolvimento científico nacional.</p><div class="tags"><span class="tag">Hollerith</span><span class="tag">Watson</span><span class="tag">tecnopoder</span><span class="tag">encerramento 2025</span></div>`},
{id:"fapesp",label:"FAPESP",type:"institution",size:10,title:"FAPESP",badge:"Actante — instituição",content:`<p>Fundação de Amparo à Pesquisa do Estado de São Paulo. Agência pública co-financiadora do C4AI junto com a IBM e a USP. A não-renovação do convênio FAPESP-IBM em dezembro de 2025 formalizou o encerramento da parceria.</p><div class="tags"><span class="tag">fomento público</span><span class="tag">São Paulo</span><span class="tag">C4AI</span></div>`},
{id:"usp",label:"USP",type:"institution",size:10,title:"Universidade de São Paulo",badge:"Actante — instituição",content:`<p>Instituição-sede do C4AI. Responsável por aproximadamente 20% da produção científica brasileira. Embora robusta no contexto nacional, ocupa posição periférica nos ecossistemas globais de inovação em IA — dependente de infraestruturas e financiamento cujas decisões estratégicas são tomadas no Norte Global.</p><div class="tags"><span class="tag">InovaUSP</span><span class="tag">IME-USP</span><span class="tag">Sul Global</span></div>`},
{id:"spira",label:"SPIRA",type:"nonhuman",size:14,title:"SPIRA — Sistema de Detecção Precoce de Insuficiência Respiratória",badge:"Actante — sistema técnico",content:`<p>Sistema de IA para detecção precoce de insuficiência respiratória por análise de áudio da fala. Desenvolvido durante a pandemia de COVID-19 no IME-USP (FAPESP 2020/06443-5). Acurácia de 96,5% na detecção de IR por COVID-19, mas sem generalização para outras etiologias.</p><div class="fig-grid single"><div><div class="fig-label">pipeline: voz → espectrograma → classificação</div><img class="fig-thumb" src="figuras/pipeline-voz-espectograma-2026-03-18-214305.png" data-caption="Pipeline SPIRA: da voz ao espectrograma" alt="pipeline" style="aspect-ratio:auto"></div></div><div class="fig-grid"><div><div class="fig-label">arquitetura CNN14</div><img class="fig-thumb" src="figuras/spira_cnn_diagrama_real.png" data-caption="Arquitetura CNN14 do SPIRA" alt="CNN14" style="aspect-ratio:3/4;object-position:top"></div><div><div class="fig-label">filtro deslizante (kernel)</div><img class="fig-thumb" src="figuras/younesi2024_fig7_filtro_deslizante.png" data-caption="Filtro deslizante — convolução aplicada ao espectrograma" alt="filtro deslizante"></div></div><a class="ext-link" href="figuras/pipeline-voz-espectograma-2026-03-18-214902.png" target="_blank">↗ pipeline detalhado (diagrama completo)</a><a class="ext-link" href="https://drive.google.com/file/d/1Bv0d3uwBB-52MBmtN2A_qNoaBIxUkN9y/view?usp=sharing" target="_blank">↗ dataset público (CC BY-SA 4.0)</a><div class="tags"><span class="tag">CNN14</span><span class="tag">MFCC</span><span class="tag">IME-USP</span><span class="tag">COVID-19</span><span class="tag">CC BY-SA 4.0</span></div>`},
{id:"covideiro",label:"Covideiro",type:"nonhuman",size:13,title:"Covideiro",badge:"Conceito etnográfico",content:`<p>Neologismo cunhado por Marcelo Finger para designar <em>ao mesmo tempo</em> os espaços hospitalares onde pessoas infectadas foram gravadas e o conjunto de práticas que transformaram pausas na fala em biomarcadores computacionais.</p><p>O covideiro funciona como centro de cálculo distribuído e precário: enfermarias, smartphones e hospitais convertem vozes humanas em arquivos de áudio que chegam ao IME-USP para transformação em coeficientes MFCC e, finalmente, em classificações binárias.</p><div class="fig-grid"><div><div class="fig-label">waveform — paciente hospitalizado</div><img class="fig-thumb" src="figuras/spira_waveform_paciente.png" data-caption="Waveform — paciente hospitalizado (IR)" alt="waveform paciente"></div><div><div class="fig-label">waveform — controle saudável</div><img class="fig-thumb" src="figuras/spira_waveform_controle.png" data-caption="Waveform — controle saudável" alt="waveform controle"></div></div><p>As experiências dos pacientes — seus corpos, suas dores, suas mortes — são a <em>otherness</em> do SPIRA enquanto dispositivo de inscrição.</p><div class="tags"><span class="tag">Marcelo Finger</span><span class="tag">hospitais</span><span class="tag">coleta de dados</span><span class="tag">pandemia</span></div>`},
{id:"sarscov2",label:"SARS-CoV-2",type:"nonhuman",size:10,title:"SARS-CoV-2",badge:"Actante — não-humano",content:`<p>O vírus que tornou o projeto SPIRA necessário e ao mesmo tempo estruturou suas condições de possibilidade. Como actante na rede, moldou os protocolos de coleta (EPIs, distanciamento), a natureza dos dados (insuficiência respiratória como marcador) e os limites de generalização do modelo.</p><div class="tags"><span class="tag">pandemia</span><span class="tag">COVID-19</span><span class="tag">insuficiência respiratória</span></div>`},
{id:"smartphones",label:"Smartphones\ne WhatsApp",type:"nonhuman",size:10,title:"Smartphones e WhatsApp",badge:"Actante — não-humano",content:`<p>Dispositivos centrais no covideiro na primeira fase de coleta. O arquivo <code>PTT-20200511-WA0018.wav</code> — cujo espectrograma abre o Capítulo 4 — foi enviado por WhatsApp em 11 de maio de 2020, sete semanas após o início da pandemia, quando o aplicativo de coleta ainda não existia.</p><p>A nomenclatura PTT (Push To Talk) e WA (WhatsApp) inscrita no nome do arquivo é rastro material das condições improvisadas da primeira fase.</p><div class="tags"><span class="tag">WhatsApp</span><span class="tag">coleta improvisada</span><span class="tag">2020</span></div>`},
{id:"gpus",label:"GPUs",type:"nonhuman",size:9,title:"GPUs",badge:"Actante — infraestrutura",content:`<p>Unidades de processamento gráfico usadas para treinar modelos de IA. No C4AI, ficavam em uma sala trancada — acessível apenas através de uma pequena janela na porta. Foram a primeira materialidade visível da computação que o uso cotidiano raramente traz à tona.</p><p>Disputas por GPU tornavam-se decisões epistemológicas: qual pesquisador tinha acesso a processamento e quando determinava o que poderia ser computado.</p><div class="tags"><span class="tag">infraestrutura</span><span class="tag">poder computacional</span><span class="tag">C4AI</span></div>`},
{id:"hollerith",label:"Herman Hollerith\n1890",type:"historical",size:10,title:"Herman Hollerith (1890)",badge:"Actante — genealogia histórica",content:`<p>Inventor do sistema de tabulação mecânica usado no censo americano de 1890. Fundou a Tabulating Machine Company em 1896, que viria a se tornar a IBM em 1911.</p><p>A cadeia de associações que conecta a pergunta feita a Cláudio na Bluetalks de 2023 ao sistema de Hollerith em 1890 demonstra que redes tecnocientíficas atravessam tempo e espaço precisamente porque seguir atores situados significa acompanhar as associações que eles próprios fazem.</p><div class="tags"><span class="tag">IBM</span><span class="tag">genealogia corporativa</span><span class="tag">tabulação mecânica</span><span class="tag">1890</span></div>`},
{id:"translacao",label:"Translação",type:"concept",size:11,title:"Translação",badge:"Conceito — TAR (Latour/Callon)",content:`<p>Processo pelo qual atores modificam, deslocam e traduzem objetivos, interesses e entidades, criando vínculos antes inexistentes. Atores só têm sucesso quando conseguem fazer com que outros vejam seus objetivos como <em>seus próprios objetivos</em>.</p><p>No caso C4AI, a IBM buscava legitimidade e talentos baratos; a FAPESP buscava fortalecer o ecossistema; a USP buscava recursos e prestígio. Quando Cláudio falava em "ecossistema de inovação", operava precisamente essa lógica de translação: objetivos distintos traduzidos em linguagem comum.</p><div class="tags"><span class="tag">Latour</span><span class="tag">Callon</span><span class="tag">aliados</span><span class="tag">interessamento</span></div>`},
{id:"ppo",label:"Ponto de passagem\nobrigatório",type:"concept",size:11,title:"Ponto de passagem obrigatório",badge:"Conceito — TAR (Callon/Latour)",content:`<p>Posição estratégica que um ator conquista quando consegue tornar-se indispensável para que outros atores alcancem seus objetivos.</p><p>O C4AI posicionou-se como PPO para a IBM no contexto brasileiro. Porém, quando a IBM decidiu não renovar a parceria em 2025, revelou a característica crucial dos PPOs em contextos de assimetria: a IBM não abandonou um ponto de passagem que controlava — simplesmente decidiu que não precisava mais passar por ali.</p><div class="tags"><span class="tag">Callon</span><span class="tag">assimetria de poder</span><span class="tag">C4AI</span></div>`},
{id:"caixapreta",label:"Caixa-preta",type:"concept",size:11,title:"Caixa-preta",badge:"Conceito — TAR (Latour)",content:`<p>Quando um fato científico ou artefato técnico se estabiliza a ponto de não mais suscitar controvérsias, diz-se que foi posto em caixa-preta. Estudar a ciência em ação significa chegar <em>antes</em> que fatos e máquinas se tenham transformado em caixas-pretas.</p><p>O SPIRA é caracterizado como ciência em construção: o artigo científico estabilizou parcialmente os resultados, mas a falha de generalização para além dos dados pandêmicos impediu o fechamento completo da caixa-preta.</p><div class="tags"><span class="tag">Latour</span><span class="tag">SPIRA</span><span class="tag">controvérsia</span><span class="tag">estabilização</span></div>`},
{id:"refcirc",label:"Referência\ncirculante",type:"concept",size:11,title:"Referência circulante",badge:"Conceito — Latour",content:`<p>Cadeia reversível de transformações em que os fenômenos circulam perdendo a cada etapa algumas propriedades para ganhar outras que os tornem compatíveis com os centros de cálculo já instalados.</p><p>A cadeia do SPIRA: som bruto da voz do paciente → arquivo de áudio → coeficientes MFCC → classificação binária de insuficiência respiratória. Em cada etapa, perde-se materialidade e localidade; ganha-se forma, portabilidade e combinabilidade.</p><div class="fig-grid single"><div><div class="fig-label">pipeline: da voz à classificação</div><img class="fig-thumb" src="figuras/pipeline-voz-espectograma-2026-03-18-214902.png" data-caption="Pipeline SPIRA — da voz à classificação binária" alt="pipeline voz" style="aspect-ratio:auto"></div></div><div class="fig-grid"><div><div class="fig-label">convolução aplicada ao espectrograma</div><img class="fig-thumb" src="figuras/Untitled_diagram-2026-03-18-213637.png" data-caption="Convolução aplicada ao espectrograma mel — filtro deslizante e mapa de ativação" alt="convolução" style="aspect-ratio:auto"></div></div><div class="tags"><span class="tag">Latour</span><span class="tag">inscrição</span><span class="tag">MFCC</span><span class="tag">SPIRA</span></div>`},
{id:"tecnopoder",label:"Tecnopoder",type:"concept",size:11,title:"Tecnopoder",badge:"Conceito — proposto na tese",content:`<p>Conceito proposto na tese para capturar dinâmicas de poder nas relações assimétricas entre corporações globais e instituições acadêmicas periféricas, onde a configuração e o exercício do poder ocorrem através de arranjos sociotécnicos específicos.</p><p>Opera em escala meso — nas negociações cotidianas entre atores posicionados desigualmente — onde dependências e independências se criam, se reproduzem e, ocasionalmente, se contestam. Dialoga com a noção de <em>Artificial Power</em> do AI Now Institute (2025).</p><div class="tags"><span class="tag">original</span><span class="tag">assimetria</span><span class="tag">IBM</span><span class="tag">Sul Global</span></div>`},
{id:"topologia",label:"Translação\ninter-topológica",type:"concept",size:11,title:"Translação inter-topológica",badge:"Conceito — Mol/Law aplicado",content:`<p>Law e Mol propõem que o espaço sociotécnico é habitado por diferentes topologias: redes, regiões e fluidos. O escutar clínico incorporado do médico pertence a uma topologia fluida (situado, resistente à transportação). O classificador binário pertence a uma topologia de rede (transportável, replicável).</p><p>O SPIRA é descrito como esforço de <em>translação inter-topológica</em>: a tentativa de converter o fluido em rede — e a falha de generalização dos modelos é evidência de que essa conversão permaneceu incompleta.</p><div class="tags"><span class="tag">Mol</span><span class="tag">Law</span><span class="tag">SPIRA</span><span class="tag">topologia fluida</span></div>`},
{id:"espectrogram",label:"Espectrograma\nPTT-20200511",type:"media",size:13,title:"Espectrograma — PTT-20200511-WA0018.wav",badge:"Mídia — abertura do Capítulo 4",content:`<p>Espectrograma do arquivo <code>PTT-20200511-WA0018.wav</code>, gravação de voz enviada por WhatsApp em 11 de maio de 2020 por paciente hospitalizado no <em>covideiro</em>. O paciente foi instruído a dizer:</p><blockquote>Em memória às vítimas e aos sobreviventes da COVID-19. O amor ao próximo ajuda a enfrentar o coronavírus com a força que a gente precisa.</blockquote><div class="fig-grid single"><div><div class="fig-label">espectrograma mel — paciente com IR (PTT-20200511-WA0018.wav)</div><img class="fig-thumb" src="figuras/spira_paciente_com_eixos.png" data-caption="Espectrograma Mel — paciente hospitalizado, 128 coeficientes, 16kHz" alt="espectrograma paciente" style="aspect-ratio:2/1"></div></div><div class="fig-grid"><div><div class="fig-label">espectrograma — controle saudável</div><img class="fig-thumb" src="figuras/spira_espectrograma_com_eixos.png" data-caption="Espectrograma Mel — controle saudável, 128 coeficientes, 16kHz" alt="espectrograma controle"></div><div><div class="fig-label">convolução aplicada ao espectrograma</div><img class="fig-thumb" src="figuras/pipeline-voz-espectograma-2026-03-18-214902.png" data-caption="Convolução: filtro deslizante sobre o espectrograma mel" alt="convolução"></div></div><div class="fig-grid"><div><div class="fig-label">waveform — paciente com IR</div><img class="fig-thumb" src="figuras/spira_waveform_paciente.png" data-caption="Waveform — paciente com insuficiência respiratória" alt="waveform paciente" style="aspect-ratio:3/1"></div><div><div class="fig-label">waveform — controle saudável</div><img class="fig-thumb" src="figuras/spira_waveform_controle.png" data-caption="Waveform — controle saudável" alt="waveform controle" style="aspect-ratio:3/1"></div></div><p style="font-size:.6rem;color:#aaa;margin-top:.8rem">ouça a gravação:</p><audio controls><source src="https://drive.google.com/uc?export=download&id=1Bv0d3uwBB-52MBmtN2A_qNoaBIxUkN9y" type="audio/wav">formato não suportado — <a href="https://drive.google.com/file/d/1Bv0d3uwBB-52MBmtN2A_qNoaBIxUkN9y/view?usp=sharing" target="_blank">acesse aqui</a></audio><div class="tags"><span class="tag">covideiro</span><span class="tag">WhatsApp</span><span class="tag">inscrição</span><span class="tag">memória</span><span class="tag">CC BY-SA 4.0</span></div>`},
{id:"lagrima",label:"LA'GRIMA\n10 anos",type:"media",size:16,title:"A imagem do som: dobras a partir de uma etnografia de laboratório de IA",badge:"Simpósio · LA'GRIMA · UNICAMP/IFCH 2026",content:`<p>Apresentação preparada para o evento de dez anos do LA'GRIMA (Laboratório de Grafias e Imagens na Pesquisa Antropológica, UNICAMP/IFCH), mesa <em>Tecnociência, Arte, Literatura e Sonhos: Dobras em um Laboratório</em>. Duração: 25 minutos.</p><p>O argumento parte de uma cena de campo no SPIRA e se organiza em torno de um objeto singular: o espectrograma mel, representação bidimensional do sinal de voz que converte som em imagem. A proposta é que esse objeto — a imagem do som — não funciona apenas como dado técnico, mas como dispositivo analítico para pensar três questões: os regimes de inscrição que convertem corpos em dados; os modos de ver próprios de um algoritmo que aprendeu a ouvir olhando; e as possibilidades da escrita etnográfica quando o campo devolve imagens que a etnógrafa não sabe ler, mas o computador sabe.</p><div style="margin:1rem 0;border-top:1px solid #e8e6e0;padding-top:.8rem"><p style="font-size:.6rem;color:#aaa;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.6rem">cinco movimentos</p><div style="display:flex;flex-direction:column;gap:.3rem"><button class="mov-btn" onclick="showMovimento('m1')" style="text-align:left;background:none;border:1px solid #e0deda;padding:.35rem .7rem;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#888;letter-spacing:.05em">M1 — ver o som <span style="color:#ccc;float:right">3 min</span></button><button class="mov-btn" onclick="showMovimento('m2')" style="text-align:left;background:none;border:1px solid #e0deda;padding:.35rem .7rem;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#888;letter-spacing:.05em">M2 — a cadeia que transforma som em imagem <span style="color:#ccc;float:right">5 min</span></button><button class="mov-btn" onclick="showMovimento('m3')" style="text-align:left;background:none;border:1px solid #e0deda;padding:.35rem .7rem;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#888;letter-spacing:.05em">M3 — o algoritmo que aprendeu a ouvir olhando <span style="color:#ccc;float:right">5 min</span></button><button class="mov-btn" onclick="showMovimento('m4a')" style="text-align:left;background:none;border:1px solid #e0deda;padding:.35rem .7rem;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#888;letter-spacing:.05em">M4a — a imagem do som na escrita etnográfica <span style="color:#ccc;float:right">5 min</span></button><button class="mov-btn" onclick="showMovimento('m4b')" style="text-align:left;background:none;border:1px solid #e0deda;padding:.35rem .7rem;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#888;letter-spacing:.05em">M4b — qual insuficiência respiratória o espectrograma performa? <span style="color:#ccc;float:right">5 min</span></button><button class="mov-btn" onclick="showMovimento('m5')" style="text-align:left;background:none;border:1px solid #e0deda;padding:.35rem .7rem;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:#888;letter-spacing:.05em">M5 — a dobra como método: a grima do campo <span style="color:#ccc;float:right">2 min</span></button></div></div><div class="tags"><span class="tag">LA'GRIMA</span><span class="tag">UNICAMP</span><span class="tag">imagem do som</span><span class="tag">espectrograma</span><span class="tag">modos de ver</span><span class="tag">Barthes</span><span class="tag">Mol</span><span class="tag">Latour</span><span class="tag">Akrich</span></div>`},
{id:"m1",label:"M1\nver o som",type:"media",size:10,title:"Movimento 1 — Ver o som",badge:"LA'GRIMA 2026 · Simpósio",content:`<p><em>[Áudio: PTT-20200511-WA0018.wav — sem aviso prévio. Deixar terminar completamente.]</em></p><p style="font-size:.62rem;font-style:italic;color:#888;margin:.5rem 0">"Guardem essa voz. Vou precisar dela daqui a pouco."</p><div class="fig-grid single"><div><div class="fig-label">slide 1 — sem legenda, sem título, tela inteira</div><img class="fig-thumb" src="figuras/spira_espectrograma_sem_legenda.png" data-caption="Espectrograma mel — voluntário saudável, sem legenda. A textura espectral antes da nomeação analítica." alt="espectrograma sem legenda" style="aspect-ratio:2/1"></div></div><p>Esta imagem é o espectrograma mel da voz que vocês acabaram de ouvir. Uma pessoa recitando a frase "O amor ao próximo ajuda a enfrentar o coronavírus com a força que a gente precisa". Uma voz que não tem nome: o dataset do SPIRA foi coletado de forma completamente anônima, e nem os próprios pesquisadores sabem quem foram os voluntários.</p><div class="fig-grid single"><div><div class="fig-label">slide 2 — com eixos nomeados e fórmula f(x,y)</div><img class="fig-thumb" src="figuras/spira_espectrograma_com_eixos.png" data-caption="Espectrograma mel com eixos: voluntário saudável. Eixo x = tempo (s), eixo y = frequência Mel, intensidade em dB." alt="espectrograma com eixos" style="aspect-ratio:2/1"></div></div><p>O livro <em>Processamento Digital de Imagens</em> define uma imagem digital como função discreta $f(x,y)$, onde $x$ e $y$ são coordenadas espaciais e o valor de $f$ é a amplitude do sinal naquele ponto. Essa definição não distingue a fotografia de uma criança do espectrograma de uma tosse. No espectrograma mel, as coordenadas ganham nome: $x$ é o tempo, $y$ é a frequência mapeada na escala Mel — que imita a percepção auditiva humana. O que a imagem representa não é o som como ele é fisicamente, mas o som como o ouvido humano o ponderaria. Essa grade foi construída à imagem da escuta humana e entregue a um algoritmo que nunca ouviu nada.</p><p><em>[Segundo áudio: PTT-20200511-WA0018.wav — paciente hospitalizado, mesma frase, coletada em enfermaria de COVID-19 em 11 de maio de 2020 via WhatsApp.]</em></p><div class="fig-grid"><div><div class="fig-label">voluntário saudável — sem legenda</div><img class="fig-thumb" src="figuras/spira_espectrograma_sem_legenda.png" data-caption="Espectrograma — voluntário saudável (controle)" alt="espectrograma controle sem legenda"></div><div><div class="fig-label">paciente hospitalizado — sem legenda</div><img class="fig-thumb" src="figuras/spira_paciente_sem_legenda.png" data-caption="Espectrograma — paciente hospitalizado com IR (PTT-20200511-WA0018.wav)" alt="espectrograma paciente sem legenda"></div></div><p style="font-size:.62rem;font-style:italic;color:#888">"A mesma frase. O mesmo protocolo. Outra voz. Outra imagem."</p><p>Roland Barthes, em <em>A câmara clara</em>, distingue o <em>studium</em> — o campo cultural codificado — do <em>punctum</em>: o detalhe que fere, que escapa ao código. No covideiro de Marcelo, essa pergunta reaparece deslocada: o espectrograma tem <em>studium</em> para qualquer engenheiro acústico, mas não tem <em>punctum</em> para o olho humano. Quem o fere é o algoritmo. É uma imagem sem afeto para quem a olha, mas com precisão diagnóstica de 96,5% para quem a processa.</p><audio controls style="margin:.5rem 0"><source src="https://drive.google.com/uc?export=download&id=1Bv0d3uwBB-52MBmtN2A_qNoaBIxUkN9y" type="audio/wav"><a href="https://drive.google.com/file/d/1Bv0d3uwBB-52MBmtN2A_qNoaBIxUkN9y/view?usp=sharing" target="_blank">ouvir no Google Drive</a></audio><div class="tags"><span class="tag">Barthes</span><span class="tag">punctum</span><span class="tag">espectrograma</span><span class="tag">Latour</span></div>`},
{id:"m2",label:"M2\ncadeia",type:"media",size:10,title:"Movimento 2 — A cadeia que transforma som em imagem",badge:"LA'GRIMA 2026 · Simpósio",content:`<p><em>[Slide: diagrama da cadeia em 6 etapas com perdas explicitadas em cada passagem.]</em></p><div class="fig-grid single"><div><div class="fig-label">pipeline: da voz à classificação binária</div><img class="fig-thumb" src="figuras/pipeline-voz-espectograma-2026-03-18-214902.png" data-caption="Pipeline SPIRA — cadeia de referência circulante: voz → áudio → MFCC → espectrograma → classificação binária" alt="pipeline" style="aspect-ratio:auto"></div></div><p>Entre a voz do paciente e o diagnóstico do algoritmo, há uma cadeia de transformações que é, ela mesma, um argumento sobre o que conta como dado relevante. O sinal de áudio é janelado em quadros de 25 milissegundos. Em cada quadro, são calculados os Coeficientes Cepstrais na Escala Mel — 128 dimensões numéricas, descartando informações que a escala perceptual humana considera redundantes. Esses 128 coeficientes, organizados ao longo do tempo, formam a matriz bidimensional que, ao ser visualizada, produz o espectrograma.</p><p>Essa cadeia é o que Latour chama de cadeia de referência: cada elemento pertence à matéria por sua origem e à forma por sua destinação. O espectrograma é um <em>imutável móvel</em>: uma inscrição que preserva as relações do fenômeno original na exata medida em que as mobiliza. O que viaja não é a respiração — é a sua textura espectral.</p><blockquote>Mas há uma perda em cada etapa da cadeia. O janelamento descarta a continuidade temporal. A escala Mel descarta frequências que a percepção humana pondera como menos relevantes. Os 128 coeficientes descartam tudo que não cabe na compressão.</blockquote><p>Pedro de Niemeyer Cesarino cunha a expressão "corporalidades heterotópicas" para descrever o que acontece quando corpos humanos são desmontados e remontados redistribuindo capacidades e agências. A formulação é perturbadoramente precisa para o que o SPIRA faz: o corpo do paciente é desmontado em sinal de áudio, remontado em coeficientes espectrais, e de novo remontado como classificação binária.</p><div class="tags"><span class="tag">cadeia de referência</span><span class="tag">Latour</span><span class="tag">imutável móvel</span><span class="tag">MFCC</span><span class="tag">Cesarino</span></div>`},
{id:"m3",label:"M3\nalgorítmo",type:"media",size:10,title:"Movimento 3 — O algoritmo que aprendeu a ouvir olhando",badge:"LA'GRIMA 2026 · Simpósio",content:`<p>Há uma torção na história do SPIRA que é o coração desta apresentação. O algoritmo que processa o espectrograma é uma Rede Neural Convolucional — uma CNN — desenvolvida originalmente para visão computacional: reconhecer padrões em fotografias, simular o funcionamento do córtex visual humano.</p><p>O que o SPIRA faz é tratar o espectrograma da voz como se fosse uma imagem visual. Aplica a ela um classificador que aprendeu a <em>ver</em>. O algoritmo percorre o espectrograma em busca de bordas espectrais, texturas de interrupção, padrões de irregularidade que se manifestam na imagem do som como diferenças de intensidade.</p><p>Mas há uma segunda camada. Antes de chegar ao covideiro, a CNN foi pré-treinada no AudioSet: corpus do Google com mais de 5.000 horas de áudio etiquetado extraído do YouTube — sons de instrumentos, animais, tráfego, fala ambiente. O algoritmo aprendeu padrões espectrais genéricos antes de qualquer contato com vozes de pacientes. Quando chega ao covideiro, traz 80 milhões de parâmetros ajustados em outro mundo.</p><div class="fig-grid single"><div><div class="fig-label">arquitetura CNN14 — do espectrograma à classificação</div><img class="fig-thumb" src="figuras/spira_cnn_diagrama_real.png" data-caption="Arquitetura CNN14: seis blocos convolucionais, global pooling, camadas densas, saída binária" alt="CNN14" style="aspect-ratio:3/4;object-position:top"></div></div><p>Nos termos de Latour e Bastide, o algoritmo é um <em>observador</em> instalado pelo artigo para testemunhar o fenômeno em lugar do leitor. Mas esse observador chegou ao covideiro carregando uma história de olhares formados sobre outros sons. A imagem do som que ele lê é atravessada por duas histórias ao mesmo tempo: a história do paciente que tossiu numa enfermaria, e a história dos anotadores do YouTube que etiquetaram horas de áudio para o Google Research.</p><p>Tim Ingold propõe que a percepção começa por uma tríade: parar, olhar, escutar. A perturbação que o espectrograma produz é exatamente o desfazimento dessa tríade: o algoritmo <em>olha</em> onde deveria <em>escutar</em>. A CNN não para, não ouve, não situa a escuta num corpo que respira junto com o paciente. Ela varre a imagem do som em busca de padrões locais.</p><div class="tags"><span class="tag">CNN</span><span class="tag">visão computacional</span><span class="tag">AudioSet</span><span class="tag">YouTube</span><span class="tag">Ingold</span><span class="tag">modos de ver</span></div>`},
{id:"m4a",label:"M4a\nescrita",type:"media",size:10,title:"Movimento 4a — A imagem do som na escrita etnográfica",badge:"LA'GRIMA 2026 · Simpósio",content:`<p>Como a etnografia escreve com essas imagens?</p><p>Em 1942, Bateson e Mead publicaram <em>Balinese Character</em>, montando 759 fotografias em sequências analíticas para capturar dimensões do comportamento balinês que nenhuma descrição verbal alcançava. Não era ilustração: era argumento. Etienne Samain demonstra que operaram uma "dupla articulação" entre o regime visual e o verbal, onde cada um fazia o que o outro não conseguia.</p><p>O espectrograma mel na escrita etnográfica sobre o SPIRA herda esse gesto: é a imagem que faz o que a prosa não consegue — tornar visível a textura da inscrição, a granularidade da cadeia de transformação, o padrão espectral que o algoritmo lê e que o texto só consegue descrever.</p><div class="fig-grid"><div><div class="fig-label">espectrograma — paciente com IR</div><img class="fig-thumb" src="figuras/spira_paciente_com_eixos.png" data-caption="Espectrograma mel — paciente hospitalizado com insuficiência respiratória" alt="espectrograma paciente" style="aspect-ratio:2/1"></div><div><div class="fig-label">espectrograma — voluntário saudável</div><img class="fig-thumb" src="figuras/spira_espectrograma_com_eixos.png" data-caption="Espectrograma mel — voluntário saudável (controle)" alt="espectrograma controle" style="aspect-ratio:2/1"></div></div><p>Há um momento da análise do Capítulo 4 que tornou essa questão concreta. O covideiro era uma configuração de antiprogramas em cascata: carrinhos reverberando no corredor, televisores ligados, outros pacientes tossindo, protetores de plástico farfalhando. Marcelo perdeu 95% dos fonoaudiólogos que tentou recrutar. Sua resposta foi incorporar artificialmente o ruído de enfermaria ao conjunto de treinamento: o antiPrograma tornou-se componente do programa de aprendizado.</p><p>Sylvia Caiuby Novaes cunhou a expressão "silêncio eloquente" para descrever o que as imagens fotográficas guardam daquilo que a etnografia não consegue verbalizar. O espectrograma mel tem seu próprio silêncio eloquente: o que ele não mostra — a tosse suprimida, o fonoaudiólogo que foi embora, o ruído adicionado artificialmente — é tão analiticamente denso quanto o que ele mostra.</p><div class="tags"><span class="tag">Bateson e Mead</span><span class="tag">montagem</span><span class="tag">Akrich</span><span class="tag">antiprograma</span><span class="tag">silêncio eloquente</span><span class="tag">Caiuby Novaes</span></div>`},
{id:"m4b",label:"M4b\nontologia",type:"media",size:10,title:"Movimento 4b — Qual insuficiência respiratória o espectrograma performa?",badge:"LA'GRIMA 2026 · Simpósio",content:`<p><em>[Slide: três colunas — fonendoscópio / espectrograma mel / tabela de queda de acurácia de 96,5% para 36%. Sem legenda. Silêncio breve.]</em></p><p>Annemarie Mol, em <em>The Body Multiple</em>, demonstrou que a aterosclerose que o cirurgião opera, a que o patologista examina na lâmina e a que o clínico geral descreve ao paciente não são perspectivas distintas sobre o mesmo objeto — são objetos distintos, produzidos por práticas distintas. Mol chama isso de <em>enactment</em>: as práticas performam a doença como objeto no próprio ato de intervir.</p><p>No covideiro de Marcelo, essa multiplicidade se apresenta em três versões:</p><p><strong style="color:#3a8a60">IR fluida</strong> — a que o médico ouve ao auscultar o tórax, integrando frequência respiratória, saturação e qualidade da voz num julgamento incorporado. Pertence a uma topologia fluida: existe nas conexões situadas e se desfaz quando qualquer elemento é removido. Irrepresentável nos 128 coeficientes MFCC.</p><p><strong style="color:#3a8fa8">IR de rede</strong> — a que o espectrograma mel representa, a que a CNN classifica como binária, a que o artigo reporta como 96,5% de acurácia. Pertence a uma topologia de rede: o que importa é a invariância das propriedades ao longo do deslocamento.</p><p><strong style="color:#a03868">IR fracional</strong> — quando testada em pacientes com IR por outras causas além do COVID-19, a acurácia cai de 96,5% para menos de 36%. O modelo não aprendeu a reconhecer IR em geral porque a IR em geral não existe como objeto estável. O espectrograma mel performa a insuficiência respiratória por COVID-19 em hospitais brasileiros no período pandêmico. Essa versão da IR é real. Ela funcionou. Mas é um objeto fracional: mais do que um e menos do que muitos.</p><blockquote>A decisão de usar 128 coeficientes em vez de 64, de aplicar a escala Mel em vez da linear, de pré-treinar no AudioSet — cada uma dessas decisões é uma política ontológica: sobre qual versão da IR merece existir como objeto circulável.</blockquote><div class="tags"><span class="tag">Mol</span><span class="tag">enactment</span><span class="tag">IR fluida</span><span class="tag">IR de rede</span><span class="tag">IR fracional</span><span class="tag">política ontológica</span><span class="tag">Law</span></div>`},
{id:"m5",label:"M5\ndobra",type:"media",size:10,title:"Movimento 5 — A dobra como método: a grima do campo",badge:"LA'GRIMA 2026 · Simpósio",content:`<p><em>[Slide final: o espectrograma do primeiro slide ao lado de uma frase de Kelly Koide: "Escrever com a imagem e ver com a palavra." Silêncio breve.]</em></p><p>O nome do laboratório remete à palavra "grima", em espanhol: inquietação, incômodo. Há algo nessa escolha que ressoa com a experiência que trouxe aqui. A etnografia de laboratório de IA produz, com frequência, exatamente isso: uma inquietação diante de imagens que não sei ver, de modos de percepção que o algoritmo pratica mas que não consigo reproduzir.</p><p>O espectrograma é a imagem do som: produto de uma operação técnica que transforma fenômeno acústico em representação visual, e que ao fazê-lo constrói o próprio fenômeno que pretende apenas registrar. É também uma imagem etnográfica: rastro de um covideiro, de um celular barato, de fonoaudiólogos que foram embora, de 80 milhões de parâmetros ajustados no YouTube.</p><div class="fig-grid single"><div><div class="fig-label">espectrograma — abertura e fechamento da apresentação</div><img class="fig-thumb" src="figuras/spira_espectrograma_sem_legenda.png" data-caption="A imagem do som: o espectrograma como casca da voz do paciente" alt="espectrograma final" style="aspect-ratio:2/1"></div></div><p>Georges Didi-Huberman, em <em>Cascas</em>, medita sobre o que resta de um lugar depois que as pessoas que o habitaram partiram: a casca como o que permanece quando o interior se foi. O espectrograma mel é a casca da voz do paciente: o que resta depois que o corpo saiu do covideiro, a forma espectral que o algoritmo processa como se a vida ainda estivesse ali.</p><blockquote>A dobra que o título da mesa anuncia — entre tecnociência, arte, literatura e sonhos — é essa dobra dupla: o laboratório de IA se dobra sobre a escrita etnográfica, e a escrita etnográfica se dobra sobre o laboratório. A imagem do som é o ponto de inflexão.</blockquote><p>Obrigada.</p><div class="tags"><span class="tag">LA'GRIMA</span><span class="tag">grima</span><span class="tag">dobra</span><span class="tag">Didi-Huberman</span><span class="tag">casca</span><span class="tag">Kelly Koide</span><span class="tag">Fabiana Bruno</span></div>`}
];

const links=[
{source:"tese",target:"cap1"},{source:"tese",target:"cap2"},{source:"tese",target:"cap3"},{source:"tese",target:"cap4"},
{source:"cap3",target:"fabio"},{source:"cap3",target:"claudio"},{source:"cap3",target:"c4ai"},{source:"cap3",target:"ibm"},
{source:"cap3",target:"hollerith"},{source:"cap3",target:"translacao"},{source:"cap3",target:"ppo"},{source:"cap3",target:"tecnopoder"},
{source:"cap4",target:"marcelo"},{source:"cap4",target:"spira"},{source:"cap4",target:"covideiro"},{source:"cap4",target:"sarscov2"},
{source:"cap4",target:"smartphones"},{source:"cap4",target:"caixapreta"},{source:"cap4",target:"refcirc"},{source:"cap4",target:"topologia"},
{source:"cap4",target:"espectrogram"},
{source:"c4ai",target:"ibm"},{source:"c4ai",target:"fapesp"},{source:"c4ai",target:"usp"},{source:"c4ai",target:"fabio"},
{source:"c4ai",target:"claudio"},{source:"c4ai",target:"gpus"},{source:"ibm",target:"hollerith"},
{source:"spira",target:"marcelo"},{source:"spira",target:"covideiro"},{source:"spira",target:"espectrogram"},
{source:"spira",target:"caixapreta"},{source:"spira",target:"refcirc"},
{source:"covideiro",target:"smartphones"},{source:"covideiro",target:"sarscov2"},
{source:"espectrogram",target:"smartphones"},{source:"fapesp",target:"usp"},
{source:"cap1",target:"c4ai"},{source:"cap1",target:"gpus"},
{source:"lagrima",target:"m1"},{source:"lagrima",target:"m2"},{source:"lagrima",target:"m3"},
{source:"lagrima",target:"m4a"},{source:"lagrima",target:"m4b"},{source:"lagrima",target:"m5"},
{source:"lagrima",target:"espectrogram"},{source:"lagrima",target:"covideiro"},{source:"lagrima",target:"spira"},
{source:"m1",target:"espectrogram"},{source:"m2",target:"refcirc"},{source:"m3",target:"spira"},
{source:"m4a",target:"covideiro"},{source:"m4b",target:"topologia"},{source:"m5",target:"espectrogram"}
];

const W=window.innerWidth, H=window.innerHeight;
const svg=d3.select("#graph-svg");
const g=svg.append("g");

const zoom=d3.zoom().scaleExtent([.25,4]).on("zoom",e=>g.attr("transform",e.transform));
svg.call(zoom);

const sim=d3.forceSimulation(nodes)
  .force("link",d3.forceLink(links).id(d=>d.id).distance(d=>{
    if(d.source.id==="tese"||d.target.id==="tese")return 160;
    if(d.source.type==="chapter"||d.target.type==="chapter")return 110;
    return 80;
  }).strength(.6))
  .force("charge",d3.forceManyBody().strength(d=>d.type==="core"?-400:-180))
  .force("center",d3.forceCenter(W/2,H/2))
  .force("collide",d3.forceCollide(d=>d.size+18));

const link=g.append("g").selectAll("line").data(links).join("line")
  .attr("stroke","#d0cec8").attr("stroke-width",.8).attr("stroke-opacity",1);

const node=g.append("g").selectAll("g").data(nodes).join("g")
  .attr("cursor","pointer")
  .call(d3.drag()
    .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y})
    .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));

node.append("circle")
  .attr("r",d=>d.size)
  .attr("fill",d=>C[d.type]+"14")
  .attr("stroke",d=>C[d.type])
  .attr("stroke-width",d=>d.type==="core"?1.5:.7)
  .attr("stroke-opacity",.6);

node.each(function(d){
  const el=d3.select(this);
  const lines=d.label.split("\n");
  const txt=el.append("text")
    .attr("text-anchor","middle")
    .attr("fill",d=>C[d.type])
    .attr("fill-opacity",.75)
    .attr("font-size",d.size>14?"8px":"7px")
    .attr("font-family","IBM Plex Mono,monospace")
    .attr("pointer-events","none");
  if(lines.length===1){txt.attr("dominant-baseline","central").text(d.label)}
  else{lines.forEach((l,i)=>txt.append("tspan").attr("x",0).attr("dy",i===0?`-${(lines.length-1)*.55}em`:"1.2em").text(l))}
});

const tip=document.getElementById("tip");

node.on("mouseover",(e,d)=>{
    d3.select(e.currentTarget).select("circle").attr("fill",C[d.type]+"28").attr("stroke-opacity",1);
    tip.style.display="block";tip.textContent=d.label.replace(/\n/g," ");
    tip.style.left=(e.clientX+12)+"px";tip.style.top=(e.clientY-18)+"px";
  })
  .on("mousemove",e=>{tip.style.left=(e.clientX+12)+"px";tip.style.top=(e.clientY-18)+"px"})
  .on("mouseout",(e,d)=>{
    d3.select(e.currentTarget).select("circle").attr("fill",C[d.type]+"14").attr("stroke-opacity",.6);
    tip.style.display="none";
  })
  .on("click",(e,d)=>{e.stopPropagation();showPanel(d)});

svg.on("click",()=>document.getElementById("panel").classList.remove("open"));

sim.on("tick",()=>{
  link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
      .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  node.attr("transform",d=>`translate(${d.x},${d.y})`);
});

function showPanel(d){
  const p=document.getElementById("panel");
  const col=C[d.type];
  const badge=document.getElementById("pbadge");
  badge.textContent=d.badge;
  badge.style.color=col;
  badge.style.borderColor=col+"33";
  const ptitle=document.getElementById("ptitle");
  ptitle.textContent=d.title;
  ptitle.style.color=col;
  document.getElementById("pbody").innerHTML=d.content;
  p.classList.add("open");
}

document.getElementById("pcl").onclick=()=>document.getElementById("panel").classList.remove("open");

function showMovimento(id){
  const d=nodes.find(n=>n.id===id);
  if(d) showPanel(d);
}

document.getElementById("intro").addEventListener("click",()=>{
  const intro=document.getElementById("intro");
  intro.classList.add("out");
  setTimeout(()=>intro.style.display="none",1200);
});

const lb=document.getElementById("lightbox");
const lbImg=document.getElementById("lightbox-img");
const lbCap=document.getElementById("lightbox-caption");
document.getElementById("lightbox-close").onclick=e=>{e.stopPropagation();lb.classList.remove("open")};
lb.onclick=()=>lb.classList.remove("open");
document.addEventListener("keydown",e=>{if(e.key==="Escape")lb.classList.remove("open")});
document.getElementById("pbody").addEventListener("click",e=>{
  const t=e.target;
  if(t.classList.contains("fig-thumb")){
    lbImg.src=t.src;
    lbCap.textContent=t.dataset.caption||t.alt||"";
    lb.classList.add("open");
  }
});
</script>
</body>
</html>
