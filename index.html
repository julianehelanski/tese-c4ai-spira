<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A imagem do som · LA'GRIMA 10 anos · Juliane Helanski</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;1,300&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#ffffff;--text:#111111;--muted:#aaa8a2;--border:#e0deda;--warm:#f5f3ef;
  --teal:#3a8fa8;--amber:#a06832;--purple:#6b5aaa;--green:#3a8a60;
  --olive:#8a8a30;--rose:#a03868;--near:#1a1a18;
  --sans:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--sans);color:var(--text)}

/* ── TRAIL (topo) ── */
#trail{
  position:fixed;top:0;left:0;right:0;height:48px;
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 1.4rem;gap:0;
  z-index:100;
}
#trail-title{
  font-family:var(--mono);font-size:.58rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--muted);white-space:nowrap;
  margin-right:1.5rem;flex-shrink:0;
}
#trail-stops{
  display:flex;align-items:center;gap:0;flex:1;overflow:hidden;
}
.trail-stop{
  display:flex;align-items:center;cursor:pointer;
  transition:opacity .2s;
}
.trail-stop:hover{opacity:.75}
.trail-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--border);flex-shrink:0;
  transition:all .3s;
}
.trail-stop.active .trail-dot{transform:scale(1.6)}
.trail-stop.visited .trail-dot{opacity:.55}
.trail-connector{
  width:20px;height:1px;background:var(--border);flex-shrink:0;
}
.trail-label{
  display:none;
  position:absolute;top:100%;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:.5rem;letter-spacing:.1em;
  color:var(--muted);white-space:nowrap;padding:.2rem .4rem;
  background:var(--bg);border:1px solid var(--border);
}
.trail-stop:hover .trail-label{display:block}
.trail-stop{position:relative}

#progress-bar{
  position:fixed;top:48px;left:0;height:2px;
  background:var(--teal);transition:width .4s cubic-bezier(.16,1,.3,1);
  z-index:100;
}

/* ── LAYOUT PRINCIPAL ── */
#main{
  position:fixed;top:48px;left:0;right:0;bottom:0;
  display:grid;grid-template-rows:1fr auto;
  overflow:hidden;
}
#content-area{
  display:grid;grid-template-columns:1fr 1fr;
  overflow:hidden;
}
/* tela inteira para slides de imagem */
#main.fullscreen #content-area{grid-template-columns:1fr}
#main.fullscreen #panel-content{display:none}

/* ── PAINEL VISUAL (esq) ── */
#panel-visual{
  background:var(--near);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;transition:background .5s;
}
#panel-visual.light{background:var(--warm)}
#panel-visual img{
  max-width:100%;max-height:100%;object-fit:contain;
  display:block;transition:opacity .4s;
}
#visual-badge{
  position:absolute;bottom:1rem;left:1rem;
  font-family:var(--mono);font-size:.52rem;letter-spacing:.15em;
  text-transform:uppercase;color:#555550;padding:.2rem .5rem;
  border:1px solid #2a2a28;
}
#panel-visual.light #visual-badge{color:var(--muted);border-color:var(--border)}
#visual-placeholder{
  display:flex;flex-direction:column;align-items:center;gap:1.2rem;
  padding:2rem;text-align:center;
}
#visual-placeholder .node-id{
  font-family:var(--mono);font-size:.6rem;letter-spacing:.3em;color:#444440;
  text-transform:uppercase;
}
#visual-placeholder .node-type-dot{
  width:20px;height:20px;border-radius:50%;margin:0 auto;
}
#visual-placeholder .node-main-title{
  font-family:var(--sans);font-size:1.4rem;font-weight:300;color:#ccc;
  line-height:1.3;max-width:280px;
}
#visual-placeholder .node-badge-text{
  font-family:var(--mono);font-size:.5rem;letter-spacing:.2em;
  color:#444;text-transform:uppercase;
}

/* ── PAINEL CONTEÚDO (dir) ── */
#panel-content{
  background:var(--bg);overflow-y:auto;
  border-left:1px solid var(--border);
  padding:1.8rem 1.6rem;
}
#node-badge{
  font-family:var(--mono);font-size:.52rem;letter-spacing:.2em;
  text-transform:uppercase;border:1px solid var(--border);
  display:inline-block;padding:.2rem .5rem;margin-bottom:1rem;color:var(--muted);
}
#node-title{
  font-family:var(--sans);font-weight:600;font-size:1.05rem;
  line-height:1.35;letter-spacing:-.02em;margin-bottom:1.1rem;
}
#node-body{
  font-family:var(--sans);font-size:.7rem;line-height:1.9;color:var(--text);
}
#node-body p{margin-bottom:.9rem}
#node-body blockquote{
  border-left:2px solid var(--border);padding-left:.8rem;
  color:#444;font-style:italic;font-weight:300;margin:1rem 0;
  font-size:.68rem;
}
#node-body code{font-family:var(--mono);font-size:.62rem;color:#555}
#node-body .fig-thumb{
  width:100%;object-fit:cover;border:1px solid var(--border);
  margin:.4rem 0;cursor:zoom-in;
}
#node-body .fig-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:.6rem 0}
#node-body .fig-grid.single{grid-template-columns:1fr}
#node-body .fig-label{font-size:.5rem;letter-spacing:.1em;color:var(--muted);margin-bottom:.2rem;text-transform:uppercase}

/* ── SCRIPT / FALA (rodapé) ── */
#script-area{
  background:var(--warm);border-top:1px solid var(--border);
  display:grid;grid-template-columns:auto 1fr auto;
  align-items:start;gap:1.2rem;padding:1rem 1.4rem;
  min-height:90px;max-height:200px;
}
#script-label{
  font-family:var(--mono);font-size:.52rem;letter-spacing:.25em;
  text-transform:uppercase;color:var(--muted);padding-top:.08rem;
  flex-shrink:0;white-space:nowrap;
}
#script-text{
  font-family:var(--sans);font-size:.72rem;line-height:1.75;color:var(--text);
  overflow-y:auto;max-height:160px;
}
#script-text em{font-style:italic;color:var(--muted)}
#script-text strong{font-weight:600;color:var(--text)}
#script-text .instrucao{
  font-family:var(--mono);font-size:.58rem;color:var(--amber);
  letter-spacing:.05em;display:block;margin-bottom:.4rem;
}

/* ── NAVEGAÇÃO ── */
#nav-area{
  display:flex;flex-direction:column;align-items:flex-end;gap:.3rem;
  flex-shrink:0;
}
#stop-counter{
  font-family:var(--mono);font-size:.55rem;letter-spacing:.15em;
  color:var(--muted);text-align:right;
}
#nav-btns{display:flex;gap:.4rem}
.nav-btn{
  background:none;border:1px solid var(--border);
  font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;
  color:var(--muted);padding:.28rem .7rem;cursor:pointer;
  transition:all .15s;
}
.nav-btn:hover{border-color:var(--text);color:var(--text)}
.nav-btn:disabled{opacity:.25;cursor:default}
.nav-btn.primary{
  background:var(--text);border-color:var(--text);color:var(--bg);
}
.nav-btn.primary:hover{background:#333}

/* ── LIGHTBOX ── */
#lightbox{
  position:fixed;inset:0;z-index:500;background:rgba(10,10,8,.94);
  display:none;align-items:center;justify-content:center;cursor:zoom-out;
}
#lightbox.open{display:flex}
#lightbox img{max-width:92vw;max-height:90vh;object-fit:contain}
#lb-close{
  position:fixed;top:1rem;right:1.4rem;background:none;border:none;
  font-family:var(--mono);font-size:.65rem;color:#888;cursor:pointer;
  letter-spacing:.1em;
}

/* ── TIPO DE NÓ → COR DO DOT ── */
.type-core{background:var(--near)}
.type-chapter{background:var(--teal)}
.type-person{background:var(--amber)}
.type-institution{background:var(--purple)}
.type-nonhuman{background:var(--green)}
.type-concept{background:var(--olive)}
.type-media{background:var(--rose)}
.type-special{background:var(--teal)}

/* ── KEYBOARD HINT ── */
#kbd-hint{
  position:fixed;bottom:1rem;right:1rem;
  font-family:var(--mono);font-size:.48rem;letter-spacing:.1em;
  color:var(--border);z-index:50;pointer-events:none;
}

/* ── ANIMAÇÃO DE TRANSIÇÃO ── */
#main{transition:opacity .25s}
#main.fade{opacity:0}
</style>
</head>
<body>

<!-- TRAIL -->
<div id="trail">
  <div id="trail-title">A imagem do som</div>
  <div id="trail-stops"></div>
</div>
<div id="progress-bar"></div>

<!-- MAIN -->
<div id="main">
  <div id="content-area">
    <div id="panel-visual">
      <div id="visual-placeholder">
        <div class="node-type-dot"></div>
        <div class="node-id"></div>
        <div class="node-main-title"></div>
        <div class="node-badge-text"></div>
      </div>
      <div id="visual-badge"></div>
    </div>
    <div id="panel-content">
      <div id="node-badge"></div>
      <div id="node-title"></div>
      <div id="node-body"></div>
    </div>
  </div>
  <div id="script-area">
    <div id="script-label">fala</div>
    <div id="script-text"></div>
    <div id="nav-area">
      <div id="stop-counter"></div>
      <div id="nav-btns">
        <button class="nav-btn" id="btn-prev">← anterior</button>
        <button class="nav-btn primary" id="btn-next">próximo →</button>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lb-close">ESC · fechar</button>
  <img id="lb-img" src="" alt="">
</div>

<div id="kbd-hint">← → espaço · navegar</div>

<script>
const BASE = 'https://julianehelanski.github.io/tese-c4ai-spira/';
const IMG  = BASE + 'figuras/';

// ══════════════════════════════════════════════════════════════════════
// DADOS: sequência de paradas
// ══════════════════════════════════════════════════════════════════════
const STOPS = [

// ── 0. PONTO DE PARTIDA ──────────────────────────────────────────────
{
  id:'intro', type:'special', mv:'—',
  title:'Parto daqui',
  badge:'Tecnoetnografia do C4AI · UNICAMP/IFCH',
  image:null,
  imgDark:true,
  placeholder:{
    title:'A imagem do som',
    sub:'dobras a partir de uma\netnografia de laboratório\nde inteligência artificial',
    badge:'LA\'GRIMA 10 anos · 2026',
  },
  content:`<p>Esta sequência percorre os nós que construí ao longo de quatro anos de campo no Centro de Inteligência Artificial da USP. Cada nó é um actante que seguei — uma pessoa, uma instituição, um conceito, uma imagem.</p>
<p>Parto do nó <strong>Tecnoetnografia</strong> — o método que desenvolvi para seguir inscrições tecnocientíficas em redes de IA — e chego ao nó <strong>LA'GRIMA</strong> e seus cinco movimentos.</p>
<p style="font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:.1em;color:var(--muted);margin-top:1.2rem">navegue com ← → ou barra de espaço</p>`,
  script:`Bom dia. Vou fazer uma apresentação um pouco diferente. Em vez de slides, vou navegar pelos nós da minha pesquisa — como se estivéssemos percorrendo a rede que construí ao longo de quatro anos de campo no C4AI, o Centro de Inteligência Artificial da USP. Cada nó é um actante que segui: uma pessoa, uma instituição, um conceito, uma inscrição. Parto de um nó chamado tecnoetnografia — o método que desenvolvi — e chego à apresentação que preparei para os dez anos do LA'GRIMA. O que vou mostrar não é a tese inteira: é um fio que percorre a rede.`
},

// ── 1. TECNOETNOGRAFIA ───────────────────────────────────────────────
{
  id:'tecnoetnografia', type:'concept', mv:'partida',
  title:'Tecnoetnografia — proposta metodológica',
  badge:'Método · STS · Inscrições tecnocientíficas',
  image:null,
  imgDark:false,
  placeholder:{title:'Tecno-\netnografia',sub:'proposta metodológica',badge:'Conceito · Método'},
  content:`<p>Proposta metodológica central da tese, desenvolvida para seguir inscrições tecnocientíficas em redes sociotécnicas de IA. Articula: observação prolongada, análise documental, rastreamento histórico e análise de artefatos técnicos como dispositivos de inscrição.</p>
<p>A tecnoetnografia não é etnografia <em>de</em> tecnologia — isso os STS já fazem. Nem etnografia <em>com</em> auxílio de tecnologia — isso é declaração instrumental. É o movimento pelo qual o objeto da análise e o instrumento da análise se dobram parcialmente um sobre o outro, sem se colapsar.</p>
<p>O espectrograma que analiso é do mesmo tipo que os espectrogramas que o laboratório produz. O código que gero é do mesmo tipo que o código que o laboratório executa. Grafias heterogêneas — diagrama, imagem histológica, forma de onda, áudio, código, sítio web — feitas do mesmo material que o objeto que descrevem.</p>`,
  script:`O método que desenvolvi chama-se tecnoetnografia. Não é um nome pomposo para etnografia digital, nem é uma declaração de que usei IA para escrever. É uma proposta metodológica específica: a dobra entre o instrumento da análise e o objeto da análise. Quando gerei espectrogramas a partir dos arquivos de áudio do SPIRA, produzi imagens do mesmo tipo que as que os artigos do laboratório publicam. O instrumento da análise era feito do mesmo material que o objeto analisado. Essa dobra — Kofes a chama de grafia que perturba o conhecimento, Law a chama de enactment — é o que nomeio como tecnoetnografia. Parto daqui.`
},

// ── 2. LAGRIMA ───────────────────────────────────────────────────────
{
  id:'lagrima', type:'media', mv:'LA\'GRIMA',
  title:"A imagem do som: dobras de uma etnografia de laboratório de IA",
  badge:"Simpósio · LA'GRIMA · UNICAMP/IFCH 2026",
  image:null,
  imgDark:false,
  placeholder:{title:"LA'GRIMA\n10 anos",sub:"mesa: Tecnociência, Arte,\nLiteratura e Sonhos",badge:"Simpósio · 2026"},
  content:`<p>Apresentação preparada para o evento de dez anos do LA'GRIMA (Laboratório de Grafias e Imagens na Pesquisa Antropológica, UNICAMP/IFCH), mesa <em>Tecnociência, Arte, Literatura e Sonhos: Dobras em um Laboratório</em>. Duração: 25 minutos, 5 movimentos.</p>
<ul style="font-size:.68rem;line-height:2;margin:.8rem 0 0 1rem">
<li><strong>M1</strong> — Ver o som <span style="color:var(--muted)">3min</span></li>
<li><strong>M2</strong> — A cadeia que transforma som em imagem <span style="color:var(--muted)">5min</span></li>
<li><strong>M3</strong> — O algoritmo que aprendeu a ouvir olhando <span style="color:var(--muted)">5min</span></li>
<li><strong>M4a</strong> — A imagem do som na escrita etnográfica <span style="color:var(--muted)">5min</span></li>
<li><strong>M4b</strong> — Qual insuficiência respiratória o espectrograma performa? <span style="color:var(--muted)">5min</span></li>
<li><strong>M5</strong> — A dobra como método: a grima do campo <span style="color:var(--muted)">2min</span></li>
</ul>`,
  script:`Esta apresentação tem cinco movimentos. Vou percorrê-los aqui, navegando pelos nós que a constituem. O argumento parte de uma cena de campo no projeto SPIRA — o sistema de detecção de insuficiência respiratória por análise de voz coordenado por Marcelo Finger no IME-USP — e se organiza em torno de um objeto singular que encontrei lá: o espectrograma mel, a representação bidimensional do sinal de voz. A pergunta central: o que significa, para uma etnógrafa, aprender a ver uma imagem que o computador lê melhor do que ela?`
},

// ── 3. M1 — ABERTURA ─────────────────────────────────────────────────
{
  id:'m1-abertura', type:'media', mv:'M1',
  title:'Movimento 1 — Ver o som',
  badge:"LA'GRIMA 2026 · 3 minutos",
  image:null,
  imgDark:false,
  placeholder:{title:'M1\nVer o som',sub:'3 minutos',badge:'Abertura'},
  content:`<p><em style="font-size:.65rem;color:var(--amber);font-family:var(--mono)">[→ Reproduzir áudio: spira_amostra.wav — sem aviso prévio. Deixar terminar.]</em></p>
<p style="font-style:italic;color:var(--muted);font-size:.7rem;margin:.8rem 0">"Guardem essa voz. Vou precisar dela daqui a pouco."</p>
<p>Uma voz que não tem nome. O dataset do SPIRA foi coletado de forma completamente anônima — nem os próprios pesquisadores sabem quem foram os voluntários e os pacientes que doaram suas gravações. A anonimização foi condição do projeto: foi o que permitiu que os dados circulassem, que o artigo fosse publicado, que o dataset se tornasse público.</p>
<p>A voz que o público ouve existe como arquivo porque a pessoa que a produziu saiu completamente da cadeia. O que ficou foi o sinal. Nos termos de Latour: esse é o preço da mobilidade.</p>`,
  script:`[Reproduzir o áudio — spira_amostra.wav — sem aviso, deixar terminar completamente.]\n\nGuardem essa voz. Vou precisar dela daqui a pouco.\n\nQuero começar com um som. Uma pessoa recitando a frase "O amor ao próximo ajuda a enfrentar o coronavírus com a força que a gente precisa". Uma voz que não tem nome: o dataset do SPIRA foi coletado de forma completamente anônima. Isso não foi descuido. A anonimização foi o que permitiu que os dados circulassem, que o artigo fosse publicado, que o dataset se tornasse público sob licença aberta. A voz que vocês ouviram existe como arquivo porque a pessoa que a produziu saiu completamente da cadeia. Nos termos de Latour, esse é o preço da mobilidade.`
},

// ── 4. M1 — ESPECTROGRAMA SEM LEGENDA ────────────────────────────────
{
  id:'m1-espectro', type:'media', mv:'M1',
  title:'Espectrograma — PTT-20200511-WA0018.wav',
  badge:'Mídia — abertura do Capítulo 4',
  image:IMG+'spira_espectrograma_sem_legenda.png',
  imgDark:true,
  placeholder:{},
  content:`<p>Espectrograma mel gerado a partir de uma gravação do grupo controle do dataset público do SPIRA. Voluntário saudável. Sem eixos, sem legenda: o objeto como se apresentou antes da nomeação analítica.</p>
<p>O livro <em>Processamento Digital de Imagens</em> define uma imagem digital como uma função discreta <em>f(x,y)</em>, onde x e y são coordenadas espaciais e o valor de <em>f</em> é a amplitude do sinal naquele ponto. Essa definição não distingue a fotografia de uma criança do espectrograma de uma tosse.</p>
<p>No espectrograma mel: x é o tempo, y é a frequência mapeada na escala Mel, e f é a amplitude codificada em cor. A escala Mel imita a percepção auditiva humana — foi construída à imagem da escuta humana e entregue a um algoritmo que nunca ouviu nada.</p>`,
  script:`[Slide: espectrograma sem legenda, tela inteira, fundo preto. Silêncio antes de falar.]\n\nQuero começar com uma imagem. Só uma imagem. Sem texto, sem legenda.\n\nEsta imagem é o espectrograma mel da voz que vocês acabaram de ouvir. Uma textura espectral. 128 coeficientes organizados ao longo do tempo. O livro de processamento de imagens que os pesquisadores do SPIRA usam define uma imagem digital como uma função f(x,y) — uma definição formal que não distingue a fotografia de uma criança do espectrograma de uma tosse. Essa grade foi construída à imagem da escuta humana e entregue a um algoritmo que nunca ouviu nada.`
},

// ── 5. M1 — DUAS IMAGENS ─────────────────────────────────────────────
{
  id:'m1-duasimagens', type:'media', mv:'M1',
  title:'A mesma frase, dois corpos',
  badge:'Barthes · studium / punctum',
  image:null,
  imgDark:false,
  placeholder:{title:'A mesma frase\ndois corpos',sub:'studium · punctum',badge:'Barthes 1984'},
  content:`<div class="fig-grid">
<div><div class="fig-label">voluntário saudável</div><img class="fig-thumb" src="${IMG}spira_espectrograma_com_eixos.png" alt="espectrograma controle"></div>
<div><div class="fig-label">paciente com IR · 11 mai. 2020</div><img class="fig-thumb" src="${IMG}spira_paciente_com_eixos.png" alt="espectrograma paciente"></div>
</div>
<p>Roland Barthes distingue o <em>studium</em> — o campo cultural codificado, o que qualquer olhar treinado reconhece — do <em>punctum</em>: o detalhe que fere.</p>
<p>O espectrograma tem <em>studium</em> — qualquer engenheiro acústico lê seus eixos. Mas não tem <em>punctum</em> para o olho humano não treinado. <strong>Quem o fere é o algoritmo.</strong> O espectrograma é uma imagem sem afeto para quem a olha, mas com 96,5% de precisão diagnóstica para quem a processa.</p>`,
  script:`A mesma frase. O mesmo protocolo de coleta. Os mesmos parâmetros de processamento. Dois corpos.\n\nO que os distingue: as pausas, a duração das sílabas, a textura espectral produzida por um aparelho respiratório comprometido. É nessa diferença de textura que o algoritmo aprende a reconhecer a doença.\n\nRoland Barthes distingue o studium — o que qualquer olhar treinado reconhece — do punctum: o detalhe que fere. O espectrograma mel tem studium: qualquer engenheiro acústico o lê. Mas não tem punctum para o olho humano. Quem o fere é o algoritmo: 96,5% de precisão diagnóstica. O espectrograma é uma imagem sem afeto para quem a olha, mas com alta precisão diagnóstica para quem a processa. Essa inversão é o ponto de entrada desta apresentação.`
},

// ── 6. M2 — A CADEIA ─────────────────────────────────────────────────
{
  id:'m2-cadeia', type:'media', mv:'M2',
  title:'Movimento 2 — A cadeia que transforma som em imagem',
  badge:'Referência circulante · Latour 2001',
  image:IMG+'pipeline-voz-espectograma-2026-03-18-214902.png',
  imgDark:false,
  placeholder:{},
  content:`<p>Entre a voz do paciente e o diagnóstico do algoritmo, há uma cadeia de transformações que é, ela mesma, um argumento sobre o que conta como dado relevante:</p>

// ── 7. M3 — O ALGORITMO ──────────────────────────────────────────────

  script:`Há uma torção na história do SPIRA que me parece o coração desta apresentação. O algoritmo que processa o espectrograma é uma Rede Neural Convolucional — desenvolvida originalmente para visão computacional. O que o SPIRA faz é tratar o espectrograma da voz como se fosse uma imagem visual. O algoritmo aprendeu a ouvir olhando.\n\nMas há uma segunda camada. Antes de chegar ao covideiro, a CNN foi pré-treinada no AudioSet: corpus do Google composto de 5.000 horas de áudio do YouTube — instrumentos, animais, tráfego. Chegou ao covideiro carregando 80 milhões de parâmetros ajustados em outro mundo.\n\nNos termos de Latour e Bastide, o algoritmo é um observador instalado pelo artigo científico. Mas esse observador carrega uma história de olhares formados sobre outros sons: a história dos anotadores humanos do YouTube. A imagem do som que ele lê é atravessada por duas histórias ao mesmo tempo.\n\nO hinterland inclui o YouTube.\n\nTim Ingold propõe que a percepção começa por uma tríade: parar, olhar, escutar. O espectrograma desfaz essa tríade: o algoritmo olha onde deveria escutar.`

{

  content:`<div class="fig-grid">

</div>
<p>Em 1942, Bateson e Mead publicaram <em>Balinese Character</em>, montando 759 fotografias em sequências analíticas. Não era ilustração: era argumento. As fotografias não acompanhavam o texto — elas <em>eram</em> o texto em outra forma.</p>
<p>O espectrograma mel na escrita etnográfica herda esse gesto. Tomando a proposta de Fabiana Bruno sobre "formas que pensam": a imagem opera por justaposição, por tensão entre campos visuais, por aquilo que emerge do intervalo.</p>
<p>Sylvia Caiuby Novaes cunhou a expressão "silêncio eloquente" para o que as imagens guardam do que a etnografia não consegue verbalizar. O espectrograma tem seu silêncio eloquente: o que ele não mostra é tão analiticamente denso quanto o que mostra.</p>
<p>Isso que a des-crição de Akrich procura reverter: percorrer o caminho de volta do artefato estabilizado às condições de sua produção.</p>`,
  script:`Como a etnografia escreve com essas imagens? Quero propor que incluir o espectrograma na escrita etnográfica não é um gesto ilustrativo. A imagem do som faz trabalho analítico que a prosa não consegue fazer sozinha.\n\nEm 1942, Bateson e Mead publicaram Balinese Character — 759 fotografias em sequências analíticas. Não era ilustração: era argumento. As fotografias não acompanhavam o texto; elas eram o texto em outra forma.\n\nO covideiro era, nos termos de Akrich, uma configuração de antiprogramas em cascata: carrinhos no corredor, televisores ligados, outros pacientes tossindo. Marcelo perdeu 95% dos fonoaudiólogos que tentou recrutar. Sua resposta: incorporou artificialmente o ruído de enfermaria ao conjunto de treinamento. O antiPrograma ambiental tornou-se componente do programa de aprendizado.\n\nO espectrograma carrega esse ruído na sua textura visual. Sylvia Caiuby Novaes chamaria isso de silêncio eloquente: o que a imagem não diz é tão constitutivo do argumento quanto o que ela diz.`
},

  content:`<p>Annemarie Mol demonstrou que a aterosclerose que o cirurgião opera, a que o patologista examina na lâmina e a que o clínico geral descreve são objetos distintos, produzidos por práticas distintas, que coexistem sem se fundir.</p>
<p style="margin:.9rem 0 .3rem"><strong style="color:var(--amber)">IR fluida</strong> — o médico ouve ao auscultar o tórax, integra frequência respiratória, saturação e qualidade da voz. Topologia fluida: existe nas conexões situadas. Irrepresentável nos 128 coeficientes MFCC.</p>
<p style="margin:.3rem 0"><strong style="color:var(--teal)">IR de rede</strong> — o espectrograma mel representa, a CNN classifica, o artigo reporta 96,5%. Imutável móvel de Latour: viajou, chegou intacta. Topologia de rede.</p>
<p style="margin:.3rem 0 .9rem"><strong style="color:var(--rose)">IR fracional</strong> — testada em IR por outras causas: acurácia cai para menos de 36%. Overfitting como ontologia: o modelo não aprendeu IR em geral porque IR em geral não existe como objeto estável.</p>
<p><strong>Política ontológica</strong> — Mol & Law: a decisão de usar 128 coeficientes não é uma escolha de representação. É uma escolha sobre qual versão da IR merece existir como objeto circulável.</p>`,
  script:`Quero fazer uma pausa para colocar uma pergunta diferente. Não "o que o espectrograma representa?", mas "que insuficiência respiratória o espectrograma performa?"\n\nAnnemarie Mol demonstrou que a aterosclerose que o cirurgião opera e a que o clínico geral descreve ao paciente não são perspectivas distintas sobre o mesmo objeto. São objetos distintos, produzidos por práticas distintas.\n\nNo covideiro de Marcelo, a multiplicidade se apresenta em três versões. Primeiro, a IR fluida: a que o médico ouve ao auscultar o tórax. Segundo, a IR de rede: a que o espectrograma representa, a que a CNN classifica como binária, 96,5%. Terceiro — e mais reveladora: quando os modelos treinados com dados do SPIRA são testados em pacientes com IR por outras causas, a acurácia cai de 96,5% para menos de 36%.\n\nA interpretação técnica é overfitting. A interpretação ontológica é outra: o modelo não aprendeu IR em geral porque IR em geral não existe como objeto estável. Isso é política ontológica: a decisão de usar 128 coeficientes é uma decisão sobre qual versão da IR merece existir como objeto circulável.`
},

// Cores por tipo de nó (mesmas do site)
const TYPE_COLOR = {
  core:'#1a1a18',chapter:'#3a8fa8',person:'#a06832',institution:'#6b5aaa',
  nonhuman:'#3a8a60',concept:'#8a8a30',media:'#a03868',special:'#3a8fa8'
};

// ══════════════════════════════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════════════════════════════
let current = 0;
const visited = new Set();

// ══════════════════════════════════════════════════════════════════════
// TRAIL
// ══════════════════════════════════════════════════════════════════════
function buildTrail() {
  const container = document.getElementById('trail-stops');
  STOPS.forEach((stop, i) => {
    const dot = document.createElement('div');
    dot.className = 'trail-stop';
    dot.dataset.idx = i;
    dot.innerHTML = `
      <div class="trail-dot" style="background:${TYPE_COLOR[stop.type]||'#aaa'}"></div>
      <div class="trail-label">${stop.mv} · ${stop.id}</div>
    `;
    dot.addEventListener('click', () => goTo(i));
    container.appendChild(dot);
    if (i < STOPS.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'trail-connector';
      container.appendChild(conn);
    }
  });
}

function updateTrail() {
  document.querySelectorAll('.trail-stop').forEach((el, i) => {
    el.classList.toggle('active', i === current);
    el.classList.toggle('visited', visited.has(i) && i !== current);
  });
  const pct = ((current + 1) / STOPS.length * 100).toFixed(1);
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ══════════════════════════════════════════════════════════════════════
// RENDER STOP
// ══════════════════════════════════════════════════════════════════════
function renderStop(idx) {
  const stop = STOPS[idx];
  const main = document.getElementById('main');

  // fade out
  main.classList.add('fade');

  setTimeout(() => {
    // fullscreen mode for dark image slides
    const isFullImg = stop.image && stop.imgDark;
    main.classList.toggle('fullscreen', isFullImg);

    // VISUAL PANEL
    const pv = document.getElementById('panel-visual');
    const ph = document.getElementById('visual-placeholder');
    pv.classList.toggle('light', !stop.imgDark);

    if (stop.image) {
      ph.style.display = 'none';
      // show image
      let img = pv.querySelector('img.main-img');
      if (!img) {
        img = document.createElement('img');
        img.className = 'main-img';
        img.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain';
        pv.insertBefore(img, document.getElementById('visual-badge'));
      }
      img.src = stop.image;
      img.alt = stop.title;
      img.style.display = 'block';
      img.onclick = () => openLightbox(stop.image);
    } else {
      ph.style.display = 'flex';
      const existImg = pv.querySelector('img.main-img');
      if (existImg) existImg.style.display = 'none';
      // fill placeholder
      const dot = ph.querySelector('.node-type-dot');
      const nid = ph.querySelector('.node-id');
      const ntitle = ph.querySelector('.node-main-title');
      const nbadge = ph.querySelector('.node-badge-text');
      dot.style.background = TYPE_COLOR[stop.type] || '#aaa';
      nid.textContent = stop.mv || stop.id;
      ntitle.textContent = (stop.placeholder.title || stop.title).replace(/\n/g, '\n');
      ntitle.style.whiteSpace = 'pre-line';
      nbadge.textContent = stop.placeholder.badge || stop.badge;
      dot.style.display = isFullImg ? 'none' : 'block';
    }

    // visual badge
    const vb = document.getElementById('visual-badge');
    if (stop.imgDark && stop.image) {
      vb.textContent = stop.id + ' · ' + stop.mv;
      vb.style.display = 'block';
    } else {
      vb.style.display = 'none';
    }

    // CONTENT PANEL
    document.getElementById('node-badge').textContent = stop.badge;
    document.getElementById('node-title').textContent = stop.title;
    document.getElementById('node-body').innerHTML = stop.content;

    // attach lightbox to fig-thumbs
    document.querySelectorAll('#node-body .fig-thumb').forEach(img => {
      img.onclick = () => openLightbox(img.src);
    });

    // SCRIPT
    document.getElementById('script-text').innerHTML = formatScript(stop.script);

    // COUNTER
    document.getElementById('stop-counter').textContent =
      (idx + 1) + ' / ' + STOPS.length + ' · ' + stop.mv;

    // NAV BUTTONS
    document.getElementById('btn-prev').disabled = idx === 0;
    document.getElementById('btn-next').disabled = idx === STOPS.length - 1;
    document.getElementById('btn-next').textContent =
      idx === STOPS.length - 1 ? '✓ fim' : 'próximo →';

    // fade in
    main.classList.remove('fade');
  }, 200);
}

function formatScript(text) {
  return text
    .replace(/\[([^\]]+)\]/g, '<span class="instrucao">[$1]</span>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

// ══════════════════════════════════════════════════════════════════════
// NAVEGAÇÃO
// ══════════════════════════════════════════════════════════════════════
function goTo(idx) {
  if (idx < 0 || idx >= STOPS.length) return;
  visited.add(current);
  current = idx;
  updateTrail();
  renderStop(current);
}

function next() { goTo(current + 1) }
function prev() { goTo(current - 1) }

document.getElementById('btn-next').addEventListener('click', next);
document.getElementById('btn-prev').addEventListener('click', prev);

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (document.getElementById('lightbox').classList.contains('open')) {
    if (e.key === 'Escape') closeLightbox();
    return;
  }
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
  if (e.key === 'Escape') window.location.href = BASE;
});

// Touch swipe
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].clientX });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) { dx < 0 ? next() : prev() }
});

// ══════════════════════════════════════════════════════════════════════
// LIGHTBOX
// ══════════════════════════════════════════════════════════════════════
function openLightbox(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.getElementById('lightbox').addEventListener('click', closeLightbox);
document.getElementById('lb-close').addEventListener('click', e => {
  e.stopPropagation(); closeLightbox();
});

// ══════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════
buildTrail();
updateTrail();
renderStop(0);
</script>
</body>
